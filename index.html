    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:32px 20px; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    main { width:min(900px,100%); }

    .announcement-arrow { flex:none; font-size:1.25rem; }
    nav { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
    .nav-card { min-height:150px; padding:24px; border:1px solid var(--line); border-radius:18px; background:var(--card); box-shadow:0 10px 30px rgba(23,32,51,.06); }
    .nav-card > a, .nav-title { color:var(--ink); font-size:1.3rem; font-weight:750; text-decoration:none; }
    .nav-card > a { height:100%; display:flex; align-items:center; justify-content:space-between; }
    .nav-card > a::after { content:"→"; color:var(--accent); }
    .nav-card:has(> a):hover { border-color:#9fc6d2; transform:translateY(-2px); transition:.18s ease; }
    .nav-title { display:block; margin-bottom:18px; }
    .subnav { display:flex; flex-wrap:wrap; gap:10px; }
    .subnav a { padding:9px 14px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-weight:700; text-decoration:none; }
    a:focus-visible { outline:3px solid #7ac0d3; outline-offset:4px; }
    @media (max-width:640px) { body { place-items:start center; padding-top:48px; } h1 { margin-bottom:22px; } .announcement { align-items:flex-start; } nav { grid-template-columns:1fr; } .nav-card { min-height:112px; } }
